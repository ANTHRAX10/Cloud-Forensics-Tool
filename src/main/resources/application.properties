server.port=8080
spring.application.name=cloud-forensics-tool
spring.jackson.serialization.indent_output=true
spring.data.mongodb.uri=mongodb://localhost:27017/cloudforensics
spring.data.mongodb.auto-index-creation=true

# ─── H2 In-Memory Database (for ForensicReportMetadata) ───────────────────────
spring.datasource.url=jdbc:h2:mem:forensicsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── H2 Console (accessible at /h2-console for debugging) ─────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Async thread pool for @Async report generation ──────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=25
spring.task.execution.thread-name-prefix=report-gen-
